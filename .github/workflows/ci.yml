name: Capstone CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Verify secret and runtime hygiene
        shell: bash
        run: |
          ! find . -path './.git' -prune -o \( -name '.env' -o -name '.env.docker' -o -name 'secrets.toml' -o -name '*.db' -o -name '*.pyc' \) -print | grep .
          test ! -d .venv
          test ! -d venv
      - name: Compile source
        run: python -m compileall -q app.py agents services tools utils pages mcp_server
      - name: Run tests
        run: python -m pytest -q
